<svg viewBox="0 0 1240 740" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1240" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7F3EC"/>
      <stop offset="1" stop-color="#EFE7D8"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#3A2A1A" flood-opacity="0.14"/>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <style>.m{font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace}</style>
  </defs>

  <rect width="1240" height="740" rx="30" fill="url(#bg)"/>
  <circle cx="1120" cy="90" r="150" fill="#FF6B57" opacity="0.10" filter="url(#soft)"/>
  <circle cx="120" cy="660" r="170" fill="#FFFCF6" opacity="0.7" filter="url(#soft)"/>

  <!-- ===== Detail card (left) : highlighted code + metadata ===== -->
  <g filter="url(#card)">
    <rect x="40" y="150" width="392" height="404" rx="20" fill="#FCFAF5"/>
  </g>
  <!-- code preview (Xcode-light highlighting) -->
  <g class="m" font-size="16">
    <text x="72" y="196"><tspan fill="#1F1F24">num_int </tspan><tspan fill="#1F1F24">= </tspan><tspan fill="#204FC8">123</tspan></text>
    <text x="72" y="222"><tspan fill="#1F1F24">num_str </tspan><tspan fill="#1F1F24">= </tspan><tspan fill="#C41A16">"456"</tspan></text>
    <text x="72" y="270"><tspan fill="#324FA1">print</tspan><tspan fill="#1F1F24">(</tspan><tspan fill="#324FA1">type</tspan><tspan fill="#1F1F24">(num_int))</tspan></text>
    <text x="72" y="296"><tspan fill="#324FA1">print</tspan><tspan fill="#1F1F24">(</tspan><tspan fill="#324FA1">type</tspan><tspan fill="#1F1F24">(num_str))</tspan></text>
    <text x="72" y="322"><tspan fill="#324FA1">print</tspan><tspan fill="#1F1F24">(num_int + num_str)</tspan></text>
  </g>
  <line x1="72" y1="352" x2="400" y2="352" stroke="#EAE3D5" stroke-width="1.5"/>
  <!-- metadata -->
  <text x="72" y="388" font-size="17" fill="#8C8F97">来源</text>
  <g>
    <circle cx="264" cy="383" r="9" fill="#fff"/>
    <path d="M264 374.5a8.5 8.5 0 0 1 7.4 4.3l-7.4 0z" fill="#4285F4"/>
    <path d="M257 386.5l3.5-6 7.4 0a8.5 8.5 0 0 1-10.9 6z" fill="#34A853"/>
    <path d="M271.4 378.8l-3.9 6.7a8.5 8.5 0 0 0 3.9-6.7z" fill="#FBBC05"/>
    <circle cx="264" cy="383" r="3.4" fill="#fff"/><circle cx="264" cy="383" r="2.4" fill="#4285F4"/>
  </g>
  <text x="400" y="388" font-size="17" fill="#24262B" text-anchor="end">Google Chrome</text>
  <text x="72" y="422" font-size="17" fill="#8C8F97">收录时间</text>
  <text x="400" y="422" font-size="17" fill="#24262B" text-anchor="end">2026年7月23日 22:50</text>
  <text x="72" y="456" font-size="17" fill="#8C8F97">使用次数</text>
  <text x="400" y="456" font-size="17" fill="#24262B" text-anchor="end">0 次</text>
  <line x1="72" y1="486" x2="400" y2="486" stroke="#EAE3D5" stroke-width="1.5"/>
  <text x="72" y="522" font-size="15" fill="#9A9CA3">编辑 ⌘E &#160;|&#160; 删除 ⌫ &#160;|&#160; 置顶 ⌘P &#160;|&#160; 固定桌面 ⌥P</text>

  <!-- pointer to selected row -->
  <path d="M432 356 L462 340 L462 372 Z" fill="#FF6B57"/>

  <!-- ===== Main clipboard panel (right) : code category ===== -->
  <g filter="url(#card)">
    <rect x="468" y="70" width="732" height="600" rx="24" fill="#FCFAF5"/>
  </g>

  <!-- search bar -->
  <rect x="500" y="100" width="668" height="54" rx="14" fill="#EEE8DC"/>
  <circle cx="534" cy="127" r="9" fill="none" stroke="#9A9CA3" stroke-width="2.2"/>
  <line x1="541" y1="134" x2="549" y2="142" stroke="#9A9CA3" stroke-width="2.2" stroke-linecap="round"/>
  <text x="562" y="134" font-size="19" fill="#A7A9B0">搜索剪贴板</text>

  <!-- category pills: 代码 active -->
  <g font-size="17" font-weight="500">
    <rect x="500" y="176" width="78" height="42" rx="21" fill="#EEE8DC"/>
    <text x="539" y="203" fill="#5B5E66" text-anchor="middle">文本</text>
    <rect x="590" y="176" width="78" height="42" rx="21" fill="#FF6B57"/>
    <text x="629" y="203" fill="#FFFFFF" text-anchor="middle">代码</text>
    <rect x="680" y="176" width="78" height="42" rx="21" fill="#EEE8DC"/>
    <text x="719" y="203" fill="#5B5E66" text-anchor="middle">链接</text>
    <rect x="770" y="176" width="78" height="42" rx="21" fill="#EEE8DC"/>
    <text x="809" y="203" fill="#5B5E66" text-anchor="middle">图片</text>
    <rect x="860" y="176" width="78" height="42" rx="21" fill="#EEE8DC"/>
    <text x="899" y="203" fill="#5B5E66" text-anchor="middle">截图</text>
  </g>

  <!-- code list rows (Xcode-light highlighting) -->
  <g class="m" font-size="18">
    <!-- row 1 -->
    <text x="500" y="271"><tspan fill="#1F1F24">num_int = </tspan><tspan fill="#204FC8">123</tspan></text>
    <text x="1168" y="271" fill="#9A9CA3" text-anchor="end" font-family="-apple-system">⌘1</text>
    <!-- row 2 -->
    <text x="500" y="317"><tspan fill="#1F1F24">num_str = </tspan><tspan fill="#C41A16">"456"</tspan></text>
    <text x="1168" y="317" fill="#9A9CA3" text-anchor="end" font-family="-apple-system">⌘2</text>
    <!-- row 3 selected -->
    <rect x="484" y="336" width="700" height="48" rx="12" fill="#FF6B57"/>
    <text x="500" y="367" fill="#FFFFFF"><tspan>print(</tspan><tspan fill="#FFE3DC">"num_int 数据类型为:"</tspan><tspan>, type(num_int))</tspan></text>
    <g transform="translate(1108,360)" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-4 -7 L4 -7 M0 -7 L0 2 M-6 6 L6 6 M0 6 L0 10"/>
    </g>
    <g transform="translate(1150,360)" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linejoin="round">
      <rect x="-4" y="-4" width="10" height="12" rx="2"/>
      <path d="M-7 4 L-7 -8 L3 -8"/>
    </g>
    <!-- row 4 -->
    <text x="500" y="413"><tspan fill="#1F1F24">num_new = num_int + num_flo</tspan></text>
    <text x="1168" y="413" fill="#9A9CA3" text-anchor="end" font-family="-apple-system">⌘4</text>
    <!-- row 5 -->
    <text x="500" y="459"><tspan fill="#6C7280">#!/usr/bin/python3</tspan></text>
    <text x="1168" y="459" fill="#9A9CA3" text-anchor="end" font-family="-apple-system">⌘5</text>
    <!-- row 6 -->
    <text x="500" y="505"><tspan fill="#A8136D">def </tspan><tspan fill="#324FA1">add</tspan><tspan fill="#1F1F24">(a, b): </tspan><tspan fill="#A8136D">return</tspan><tspan fill="#1F1F24"> a + b</tspan></text>
    <text x="1168" y="505" fill="#9A9CA3" text-anchor="end" font-family="-apple-system">⌘6</text>
    <!-- row 7 -->
    <text x="500" y="551"><tspan fill="#A8136D">import </tspan><tspan fill="#1F1F24">mysql.connector</tspan></text>
    <text x="1168" y="551" fill="#9A9CA3" text-anchor="end" font-family="-apple-system">⌘7</text>
    <!-- row 8 -->
    <text x="500" y="597"><tspan fill="#324FA1">print</tspan><tspan fill="#1F1F24">(</tspan><tspan fill="#C41A16">"Hello, World!"</tspan><tspan fill="#1F1F24">)</tspan></text>
    <text x="1168" y="597" fill="#9A9CA3" text-anchor="end" font-family="-apple-system">⌘8</text>
  </g>
  <line x1="500" y1="623" x2="1168" y2="623" stroke="#EFE9DD" stroke-width="1.5"/>
  <text x="500" y="650" font-size="15" fill="#B0A99A" font-family="-apple-system">代码以语法高亮呈现 · 按 ⏎ 复制 · ⌘1–9 取用置顶内容</text>
</svg>
