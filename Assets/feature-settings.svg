  </g>
  <line x1="476" y1="210" x2="984" y2="210" stroke="#F1ECE1" stroke-width="1.5"/>
  <line x1="476" y1="268" x2="984" y2="268" stroke="#F1ECE1" stroke-width="1.5"/>
  <!-- keycaps helper -->
  <g font-size="16" fill="#5B5E66" text-anchor="middle">
    <g><rect x="856" y="170" width="34" height="30" rx="7" fill="#F4F0E8" stroke="#E3DCCE" stroke-width="1.2"/><text x="873" y="191">⇧</text>
       <rect x="896" y="170" width="34" height="30" rx="7" fill="#F4F0E8" stroke="#E3DCCE" stroke-width="1.2"/><text x="913" y="191">⌘</text>
       <rect x="936" y="170" width="34" height="30" rx="7" fill="#F4F0E8" stroke="#E3DCCE" stroke-width="1.2"/><text x="953" y="191">V</text></g>
    <g><rect x="856" y="228" width="34" height="30" rx="7" fill="#F4F0E8" stroke="#E3DCCE" stroke-width="1.2"/><text x="873" y="249">⇧</text>
       <rect x="896" y="228" width="34" height="30" rx="7" fill="#F4F0E8" stroke="#E3DCCE" stroke-width="1.2"/><text x="913" y="249">⌘</text>
       <rect x="936" y="228" width="34" height="30" rx="7" fill="#F4F0E8" stroke="#E3DCCE" stroke-width="1.2"/><text x="953" y="249">P</text></g>
    <g><rect x="856" y="286" width="34" height="30" rx="7" fill="#F4F0E8" stroke="#E3DCCE" stroke-width="1.2"/><text x="873" y="307">⇧</text>
       <rect x="896" y="286" width="34" height="30" rx="7" fill="#F4F0E8" stroke="#E3DCCE" stroke-width="1.2"/><text x="913" y="307">⌘</text>
       <rect x="936" y="286" width="34" height="30" rx="7" fill="#F4F0E8" stroke="#E3DCCE" stroke-width="1.2"/><text x="953" y="307">E</text></g>
  </g>

  <!-- group 2: appearance -->
  <rect x="452" y="348" width="556" height="118" rx="14" fill="#FFFFFF" stroke="#EFE9DD" stroke-width="1.5"/>
  <text x="476" y="388" font-size="17" fill="#24262B">面板背景不透明度</text>
  <line x1="810" y1="382" x2="960" y2="382" stroke="#E3DCCE" stroke-width="4" stroke-linecap="round"/>
  <line x1="810" y1="382" x2="870" y2="382" stroke="#FF6B57" stroke-width="4" stroke-linecap="round"/>
  <circle cx="870" cy="382" r="10" fill="#FFFFFF" stroke="#E3DCCE" stroke-width="1.5"/>
  <text x="984" y="388" font-size="16" fill="#8C8F97" text-anchor="end">40%</text>
  <line x1="476" y1="408" x2="984" y2="408" stroke="#F1ECE1" stroke-width="1.5"/>
  <text x="476" y="446" font-size="17" fill="#24262B">代码配色</text>
  <rect x="876" y="426" width="108" height="32" rx="9" fill="#F4F0E8" stroke="#E3DCCE" stroke-width="1.2"/>
  <text x="894" y="447" font-size="16" fill="#5B5E66">Xcode</text>
  <path d="M960 438 l6 6 l6 -6" fill="none" stroke="#8C8F97" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- group 3: general toggles -->
  <rect x="452" y="486" width="556" height="118" rx="14" fill="#FFFFFF" stroke="#EFE9DD" stroke-width="1.5"/>
  <text x="476" y="526" font-size="17" fill="#24262B">随登录自动启动</text>
  <rect x="936" y="512" width="48" height="28" rx="14" fill="#FF6B57"/><circle cx="970" cy="526" r="11" fill="#FFFFFF"/>
  <line x1="476" y1="546" x2="984" y2="546" stroke="#F1ECE1" stroke-width="1.5"/>
  <text x="476" y="584" font-size="17" fill="#24262B">复制后自动粘贴</text>
  <rect x="936" y="570" width="48" height="28" rx="14" fill="#DED8CB"/><circle cx="950" cy="584" r="11" fill="#FFFFFF"/>

  <!-- footer -->
  <rect x="452" y="626" width="120" height="34" rx="10" fill="#FF6B57"/>
  <text x="512" y="648" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">检查更新</text>
  <text x="592" y="648" font-size="15" fill="#A7A9B0">当前版本 1.1.7 · 已是最新</text>
</svg>
