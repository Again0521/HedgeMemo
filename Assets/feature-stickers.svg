<svg viewBox="0 0 1240 740" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1240" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7F3EC"/>
      <stop offset="1" stop-color="#EFE7D8"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#3A2A1A" flood-opacity="0.14"/>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <rect width="1240" height="740" rx="30" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="150" fill="#FF6B57" opacity="0.09" filter="url(#soft)"/>
  <circle cx="1110" cy="640" r="170" fill="#FFFCF6" opacity="0.7" filter="url(#soft)"/>

  <!-- menu bar strip -->
  <g filter="url(#card)"><rect x="440" y="42" width="360" height="52" rx="14" fill="#FCFAF5"/></g>
  <g fill="#B7B2A6">
    <rect x="466" y="60" width="22" height="16" rx="3"/>
    <circle cx="716" cy="68" r="9"/>
    <rect x="748" y="60" width="20" height="16" rx="4"/>
  </g>
  <!-- HedgeMemo status item: monochrome template silhouette (matches Resources/Hedgehog.svg) -->
  <g transform="translate(536.8,53) scale(0.1786)">
    <path fill="#2B2D31" d="M 46 144 C 24 138 14 122 24 106 L 8 98 L 32 92 L 20 70 L 44 80 L 40 50 L 62 70 L 62 36 L 82 66 L 88 30 L 104 64 L 116 30 L 128 64 L 144 38 L 154 72 C 172 70 190 82 194 104 C 198 126 180 146 152 146 L 60 146 C 55 146 50 145 46 144 Z"/>
    <path fill="#FCFAF5" d="M 150 92 C 178 96 202 116 214 128 C 220 134 216 140 208 141 L 150 146 Z"/>
    <circle cx="176" cy="118" r="8" fill="#2B2D31"/>
    <circle cx="216" cy="132" r="9" fill="#2B2D31"/>
  </g>
  <!-- bubble tail linking the status item to the popover -->
  <path d="M560 94 L544 118 L576 118 Z" fill="#FCFAF5"/>

  <!-- ===== Sticker panel ===== -->
  <g filter="url(#card)"><rect x="320" y="118" width="600" height="524" rx="24" fill="#FCFAF5"/></g>

  <!-- search + tool buttons -->
  <rect x="348" y="150" width="424" height="48" rx="13" fill="#EEE8DC"/>
  <circle cx="382" cy="174" r="9" fill="none" stroke="#9A9CA3" stroke-width="2.2"/>
  <line x1="389" y1="181" x2="397" y2="189" stroke="#9A9CA3" stroke-width="2.2" stroke-linecap="round"/>
  <text x="410" y="181" font-size="18" fill="#A7A9B0">搜索备注或文字</text>
  <circle cx="812" cy="174" r="23" fill="#EEE8DC"/>
  <g transform="translate(812,174)" stroke="#5B5E66" stroke-width="2" stroke-linecap="round"><path d="M-8 -6 L-4 -6 M-8 0 L-4 0 M-8 6 L-4 6"/><path d="M0 -6 L8 -6 M0 0 L8 0 M0 6 L8 6" stroke-width="2"/><path d="M-9 -6 l2 2 3 -4" fill="none"/></g>
  <circle cx="866" cy="174" r="23" fill="#EEE8DC"/>
  <circle cx="866" cy="174" r="8" fill="none" stroke="#5B5E66" stroke-width="2"/>
  <circle cx="866" cy="174" r="2.6" fill="#5B5E66"/>

  <!-- category row -->
  <rect x="348" y="228" width="76" height="42" rx="21" fill="#FF6B57"/>
  <text x="386" y="255" font-size="17" font-weight="500" fill="#FFFFFF" text-anchor="middle">全部</text>
  <rect x="438" y="228" width="46" height="42" rx="14" fill="#EEE8DC"/>
  <line x1="461" y1="240" x2="461" y2="258" stroke="#5B5E66" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="452" y1="249" x2="470" y2="249" stroke="#5B5E66" stroke-width="2.2" stroke-linecap="round"/>

  <line x1="348" y1="298" x2="892" y2="298" stroke="#EFE9DD" stroke-width="1.5"/>

  <!-- sticker grid: 4 tiles -->
  <g>
    <!-- tile bg helper via repeated rects -->
    <rect x="348" y="322" width="124" height="124" rx="14" fill="#F1ECE2" stroke="#E6DFD1" stroke-width="1.5"/>
    <rect x="488" y="322" width="124" height="124" rx="14" fill="#F1ECE2" stroke="#E6DFD1" stroke-width="1.5"/>
    <rect x="628" y="322" width="124" height="124" rx="14" fill="#F1ECE2" stroke="#E6DFD1" stroke-width="1.5"/>
    <rect x="768" y="322" width="124" height="124" rx="14" fill="#F1ECE2" stroke="#E6DFD1" stroke-width="1.5"/>

    <!-- face 1: black cat (surprised) -->
    <g transform="translate(410,384)">
      <path d="M-30 -6 L-20 -30 L-8 -14 Z M30 -6 L20 -30 L8 -14 Z" fill="#2B2D33"/>
      <ellipse cx="0" cy="4" rx="34" ry="30" fill="#2B2D33"/>
      <circle cx="-12" cy="0" r="4.5" fill="#F7C948"/><circle cx="12" cy="0" r="4.5" fill="#F7C948"/>
      <path d="M-6 14 Q0 20 6 14" fill="none" stroke="#F1ECE2" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- face 2: white cat (blank) -->
    <g transform="translate(550,384)">
      <path d="M-30 -6 L-20 -30 L-8 -14 Z M30 -6 L20 -30 L8 -14 Z" fill="#EDE9E1" stroke="#C9C3B5" stroke-width="1.5"/>
      <ellipse cx="0" cy="4" rx="34" ry="30" fill="#EDE9E1" stroke="#C9C3B5" stroke-width="1.5"/>
      <circle cx="-12" cy="2" r="3.5" fill="#3A3C42"/><circle cx="12" cy="2" r="3.5" fill="#3A3C42"/>
      <line x1="-8" y1="16" x2="8" y2="16" stroke="#8A857A" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- face 3: 什? -->
    <g transform="translate(690,384)">
      <ellipse cx="0" cy="6" rx="32" ry="28" fill="#C9BEB0"/>
      <path d="M-28 -4 L-18 -26 L-8 -12 Z M28 -4 L18 -26 L8 -12 Z" fill="#C9BEB0"/>
      <circle cx="-11" cy="4" r="4" fill="#2B2D33"/><circle cx="11" cy="4" r="4" fill="#2B2D33"/>
      <path d="M-6 16 Q0 12 6 16" fill="none" stroke="#2B2D33" stroke-width="2.5" stroke-linecap="round"/>
      <text x="0" y="-30" font-size="22" font-weight="700" fill="#24262B" text-anchor="middle">什?</text>
    </g>
    <!-- face 4: 么? -->
    <g transform="translate(830,384)">
      <ellipse cx="0" cy="6" rx="32" ry="28" fill="#C9BEB0"/>
      <path d="M-28 -4 L-18 -26 L-8 -12 Z M28 -4 L18 -26 L8 -12 Z" fill="#C9BEB0"/>
      <circle cx="-11" cy="4" r="4" fill="#2B2D33"/><circle cx="11" cy="4" r="4" fill="#2B2D33"/>
      <path d="M-6 14 Q0 20 6 14" fill="none" stroke="#2B2D33" stroke-width="2.5" stroke-linecap="round"/>
      <text x="0" y="-30" font-size="22" font-weight="700" fill="#24262B" text-anchor="middle">么?</text>
    </g>

    <!-- add tile -->
    <rect x="348" y="462" width="124" height="124" rx="14" fill="none" stroke="#C9C3B5" stroke-width="2" stroke-dasharray="7 6"/>
    <line x1="410" y1="504" x2="410" y2="544" stroke="#B0AA9C" stroke-width="3" stroke-linecap="round"/>
    <line x1="390" y1="524" x2="430" y2="524" stroke="#B0AA9C" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
