<svg viewBox="0 0 1240 740" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1240" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7F3EC"/>
      <stop offset="1" stop-color="#EFE7D8"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="26" flood-color="#3A2A1A" flood-opacity="0.15"/>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <rect width="1240" height="740" rx="30" fill="url(#bg)"/>
  <circle cx="1120" cy="120" r="150" fill="#FF6B57" opacity="0.09" filter="url(#soft)"/>
  <circle cx="120" cy="640" r="160" fill="#FFFCF6" opacity="0.7" filter="url(#soft)"/>

  <!-- ===== Editor window ===== -->
  <g filter="url(#card)"><rect x="110" y="66" width="1020" height="608" rx="22" fill="#FCFAF5"/></g>

  <!-- title bar -->
  <circle cx="146" cy="102" r="7.5" fill="#FF6159"/><circle cx="170" cy="102" r="7.5" fill="#FFBD2E"/><circle cx="194" cy="102" r="7.5" fill="#28C840"/>
  <text x="222" y="108" font-size="18" fill="#5B5E66" font-weight="500">Capture</text>
  <!-- right actions -->
  <g stroke="#8C8F97" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M905 96 a10 10 0 1 1 -3 8 M905 96 l0 7 l7 0" transform="translate(-2,0)"/>
    <path d="M965 96 a10 10 0 1 0 3 8 M973 96 l0 7 l-7 0"/>
  </g>
  <g stroke="#8C8F97" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1018 96 l16 0 M1020 96 l1.5 15 l11 0 l1.5 -15 M1024 93 l0 -3 l4 0 l0 3"/>
  </g>
  <rect x="1058" y="88" width="60" height="30" rx="9" fill="#FF6B57"/>
  <text x="1088" y="108" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">Done</text>

  <!-- toolbar strip -->
  <line x1="110" y1="140" x2="1130" y2="140" stroke="#EFE9DD" stroke-width="1.5"/>
  <rect x="330" y="156" width="300" height="46" rx="13" fill="#EEE8DC"/>
  <!-- tool glyphs -->
  <g stroke="#5B5E66" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- crop -->
    <path d="M356 168 l0 20 l20 0 M362 162 l0 20 l20 0"/>
  </g>
  <!-- pen active -->
  <rect x="392" y="162" width="42" height="34" rx="9" fill="#FFFFFF"/>
  <g stroke="#FF6B57" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(413,179)">
    <path d="M6 -8 l4 4 l-14 14 l-5 1 l1 -5 Z"/>
  </g>
  <g stroke="#5B5E66" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- highlighter -->
    <path d="M452 188 l14 -14 l6 6 l-14 14 l-8 0 Z M450 194 l12 0" transform="translate(0,-4)"/>
    <!-- arrow -->
    <path d="M506 190 l20 -20 M519 170 l7 0 l0 7" transform="translate(2,0)"/>
    <!-- rectangle -->
    <rect x="556" y="170" width="24" height="20" rx="3"/>
  </g>
  <text x="606" y="186" font-size="17" font-weight="600" fill="#5B5E66" text-anchor="middle">Aa</text>

  <!-- color swatches -->
  <circle cx="676" cy="179" r="11" fill="#FF6B57"/><circle cx="676" cy="179" r="14" fill="none" stroke="#FF6B57" stroke-width="2"/>
  <circle cx="708" cy="179" r="11" fill="#F5911E"/>
  <circle cx="740" cy="179" r="11" fill="#F7C948"/>
  <circle cx="772" cy="179" r="11" fill="#34A853"/>
  <circle cx="804" cy="179" r="11" fill="#3B7DED"/>
  <circle cx="836" cy="179" r="11" fill="#24262B"/>
  <circle cx="868" cy="179" r="11" fill="#FFFFFF" stroke="#D8D2C4" stroke-width="1.5"/>

  <!-- thickness slider -->
  <line x1="916" y1="179" x2="1000" y2="179" stroke="#D8D2C4" stroke-width="3" stroke-linecap="round"/>
  <line x1="916" y1="179" x2="958" y2="179" stroke="#FF6B57" stroke-width="3" stroke-linecap="round"/>
  <circle cx="958" cy="179" r="9" fill="#FFFFFF" stroke="#D8D2C4" stroke-width="1.5"/>
  <text x="1020" y="185" font-size="15" fill="#8C8F97">4.0</text>

  <!-- ===== canvas with annotated content ===== -->
  <rect x="150" y="228" width="940" height="410" rx="14" fill="#F1ECE2"/>
  <!-- mock document being annotated -->
  <g filter="url(#card)"><rect x="250" y="270" width="740" height="326" rx="12" fill="#FFFFFF"/></g>
  <rect x="250" y="270" width="740" height="52" rx="12" fill="#F4F0E8"/>
  <rect x="250" y="310" width="740" height="12" fill="#F4F0E8"/>
  <text x="284" y="303" font-size="18" font-weight="600" fill="#3A3C42">July 2026</text>
  <!-- calendar-ish grid -->
  <g stroke="#EEE9DE" stroke-width="1.5">
    <line x1="250" y1="382" x2="990" y2="382"/><line x1="250" y1="454" x2="990" y2="454"/><line x1="250" y1="526" x2="990" y2="526"/>
    <line x1="356" y1="322" x2="356" y2="596"/><line x1="462" y1="322" x2="462" y2="596"/><line x1="568" y1="322" x2="568" y2="596"/><line x1="674" y1="322" x2="674" y2="596"/><line x1="780" y1="322" x2="780" y2="596"/><line x1="886" y1="322" x2="886" y2="596"/>
  </g>
  <g fill="#B8B3A6" font-size="14">
    <text x="290" y="356">28</text><text x="396" y="356">29</text><text x="502" y="356">30</text><text x="608" y="356">1</text><text x="714" y="356">2</text><text x="820" y="356">3</text><text x="926" y="356">4</text>
    <text x="290" y="428">5</text><text x="396" y="428">6</text><text x="502" y="428">7</text><text x="608" y="428">8</text><text x="714" y="428">9</text><text x="820" y="428">10</text><text x="926" y="428">11</text>
  </g>
  <rect x="586" y="440" width="180" height="20" rx="10" fill="#E5F0DD"/>
  <text x="596" y="455" font-size="13" fill="#5B8C3E">Summer</text>

  <!-- ANNOTATIONS in coral -->
  <!-- rectangle highlight -->
  <rect x="576" y="410" width="200" height="60" rx="6" fill="none" stroke="#FF6B57" stroke-width="3.5"/>
  <!-- arrow -->
  <path d="M900 350 C 850 380, 830 400, 792 428" fill="none" stroke="#FF6B57" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M792 428 l14 -6 M792 428 l6 -14" fill="none" stroke="#FF6B57" stroke-width="3.5" stroke-linecap="round"/>
  <!-- pen underline -->
  <path d="M286 512 q 20 8 40 0 t 40 0 t 40 0" fill="none" stroke="#FF6B57" stroke-width="3.5" stroke-linecap="round"/>
  <!-- text label -->
  <text x="906" y="336" font-size="20" font-weight="700" fill="#FF6B57">Focus</text>
</svg>
